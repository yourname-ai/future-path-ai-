<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Path AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f7f7f7;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 700px;
      margin: auto;
    }
    button {
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid #ccc;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Future Path AI</h1>
    <p>高校生向け 将来診断サイト</p>
    <button onclick="showResult()">AIで将来を分析する</button>
    <p id="result"></p>
  </div>

  <script>
    function showResult() {
      document.getElementById("result").innerText =
        "あなたは AI × 起業家タイプ です";
    }
  </script>
</body>
</html>
